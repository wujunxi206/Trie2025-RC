      // 防止主题闪烁：在 React 挂载前从 localStorage 读取主题与调色板
      (function () {
        try {
          var raw = localStorage.getItem('rollcall.app');
          var theme = 'dark';
          var palette = 'neon';
          if (raw) {
            var data = JSON.parse(raw);
            var s = data && data.state && data.state.settings;
            if (s) {
              if (s.theme) theme = s.theme;
              if (s.palette) palette = s.palette;
            }
          }
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.setAttribute('data-palette', palette);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.setAttribute('data-palette', 'neon');
        }
      })();
